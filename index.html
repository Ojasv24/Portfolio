<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/OR.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ojasv Rathore</title>
  <script>
    // Prevent flash: apply saved theme before first paint
    (function () {
      var t = localStorage.getItem('portfolio-theme');
      if (t === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Krub:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
</head>

<body
  class="scrollbar scrollbar-thumb-purple3 scrollbar-thumb-rounded-full scrollbar-track-Background bg-black hover:scrollbar-thumb-purple1">
  <div id="root">
    <script type="module" src="/src/main.tsx"></script>
  </div>
</body>

</html>
